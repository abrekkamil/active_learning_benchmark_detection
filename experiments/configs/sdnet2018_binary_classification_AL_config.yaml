experiment_name: "sdnet2018_binary_classification"

# =====================
# Dataset
# =====================
dataset: "SDNET2018"
dataset_type: "sdnet2018"
data_dir: "/home3/vzcl68/datasets/SDNET2018"   # update if your copied path is different
num_classes: 2
img_size: 224
scale_size: 224
label_mode: "sdnet_binary"
val_fraction: 0.15
pool_fraction: 0.0

# =====================
# Task / Model
# =====================
task: "binary_classification"
model_name: "resnet50_classification"
pretrained: true

# =====================
# Active Learning
# =====================
initial_labeled: 0.05
query_size: 1000
al_cycles: 10
epochs_per_cycle: 10
initial_training_epoch: 15
skip_cold_start: false
cold_start_strategy: "random"
query_strategy: "uncertainty"
pool: false

# =====================
# Training
# =====================
use_cuda: true
batch_size: 32
lr: 0.0001
weight_decay: 0.0001
num_workers: 4

# =====================
# Logging
# =====================
seed: 42
use_wandb: false
wandb_project: "AL_benchmark"
print_freq: 100
checkpoint_dir: "results/checkpoints/sdnet2018"
results_dir: "results/sdnet2018"
